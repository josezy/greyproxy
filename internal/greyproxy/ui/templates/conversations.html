{{define "head"}}
<!-- Marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<style>
    .conv-markdown h1, .conv-markdown h2, .conv-markdown h3, .conv-markdown h4 {
        font-weight: 600;
        margin-top: 0.75em;
        margin-bottom: 0.25em;
        line-height: 1.4;
    }
    .conv-markdown h1 { font-size: 1.1em; }
    .conv-markdown h2 { font-size: 1em; }
    .conv-markdown h3 { font-size: 0.95em; }
    .conv-markdown p { margin: 0.35em 0; }
    .conv-markdown ul { margin: 0.35em 0; padding-left: 1.5em; list-style-type: disc; }
    .conv-markdown ol { margin: 0.35em 0; padding-left: 1.5em; list-style-type: decimal; }
    .conv-markdown li { margin: 0.15em 0; }
    .conv-markdown code {
        background: rgb(var(--color-muted));
        padding: 0.1em 0.35em;
        border-radius: 3px;
        font-size: 0.9em;
    }
    .conv-markdown pre {
        background: rgb(var(--color-muted));
        padding: 0.5em 0.75em;
        border-radius: 4px;
        overflow-x: auto;
        margin: 0.5em 0;
    }
    .conv-markdown pre code {
        background: none;
        padding: 0;
    }
    .conv-markdown blockquote {
        border-left: 3px solid rgb(var(--color-border));
        padding-left: 0.75em;
        margin: 0.5em 0;
        color: rgb(var(--color-muted-foreground));
    }
    .conv-markdown a { color: rgb(var(--color-primary)); text-decoration: underline; }
    .conv-markdown table { border-collapse: collapse; margin: 0.5em 0; }
    .conv-markdown th, .conv-markdown td { border: 1px solid rgb(var(--color-border)); padding: 0.25em 0.5em; font-size: 0.9em; }
    .conv-markdown > *:first-child { margin-top: 0; }
    .conv-markdown > *:last-child { margin-bottom: 0; }
    /* Tool call cards */
    .tool-call-card { transition: border-color 0.15s; }
    .tool-call-card[data-tool-expanded="true"] { border-color: rgb(var(--color-border)); }
    .tool-call-header:hover { background: rgb(var(--color-muted) / 0.5); }
    .tool-call-chevron { transition: transform 0.15s; }
</style>
{{end}}

{{define "content"}}
<div class="space-y-4">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-foreground">Conversations</h1>
        <button id="conv-live-btn" onclick="toggleConvLive()" type="button"
            class="inline-flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-md transition-colors">
            <span id="conv-live-dot" class="relative flex h-2.5 w-2.5 overflow-hidden">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-500 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
            </span>
            <span id="conv-live-text">Live</span>
            <span id="conv-pending-badge" class="hidden ml-0.5 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none rounded-full min-w-[1.25rem]"></span>
        </button>
    </div>

    <div class="flex gap-4" style="height: calc(100vh - 12rem);">
        <!-- Sidebar: conversation list -->
        <div class="w-80 flex-shrink-0 flex flex-col bg-card rounded-lg shadow-sm border border-border overflow-hidden">
            <!-- Filters -->
            <div class="p-3 border-b border-border">
                <form id="conv-filter-form" class="space-y-2">
                    <div>
                        <select id="conv-container" name="container"
                            onchange="refreshConversations()"
                            class="block w-full pl-2 pr-8 py-1.5 text-xs border-border focus:outline-none focus:ring-ring focus:border-ring rounded-md bg-background">
                            <option value="">All Sources</option>
                            {{range .Containers}}<option value="{{.}}">{{.}}</option>{{end}}
                        </select>
                    </div>
                </form>
            </div>
            <!-- Conversation list -->
            <div id="conv-list" class="flex-1 overflow-y-auto">
                <div class="flex justify-center py-8">
                    <div class="inline-block w-6 h-6 border-3 border-primary border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>
        </div>

        <!-- Main: conversation detail -->
        <div class="flex-1 bg-card rounded-lg shadow-sm border border-border overflow-hidden flex flex-col">
            <div id="conv-detail" class="flex-1 overflow-y-auto p-6">
                <div class="flex items-center justify-center h-full text-muted-foreground">
                    <div class="text-center">
                        <svg class="mx-auto h-12 w-12 text-muted-foreground/50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                        <p class="mt-2 text-sm">Select a conversation to view details</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
var currentConvId = null;
var convLive = true;
var convPendingCount = 0;

function applyConvLiveStyle() {
    var btn = document.getElementById('conv-live-btn');
    var text = document.getElementById('conv-live-text');
    var badge = document.getElementById('conv-pending-badge');
    var dot = document.getElementById('conv-live-dot');
    if (convLive) {
        btn.className = 'inline-flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-md text-foreground hover:bg-muted transition-colors';
        text.textContent = 'Live';
        badge.classList.add('hidden');
        dot.innerHTML = '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-500 opacity-75"></span>'
                      + '<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>';
    } else {
        btn.className = 'inline-flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-md text-muted-foreground hover:bg-muted transition-colors';
        dot.innerHTML = '<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-muted-foreground/50"></span>';
        if (convPendingCount > 0) {
            text.textContent = 'Paused';
            badge.textContent = convPendingCount;
            badge.className = 'ml-0.5 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none text-primary-foreground bg-primary rounded-full min-w-[1.25rem]';
        } else {
            text.textContent = 'Paused';
            badge.classList.add('hidden');
        }
    }
}

function toggleConvLive() {
    convLive = !convLive;
    if (convLive && convPendingCount > 0) {
        convPendingCount = 0;
        refreshConversations();
    }
    applyConvLiveStyle();
}

function refreshConversations() {
    var listEl = document.getElementById('conv-list');
    var scrollTop = listEl.scrollTop;
    var container = document.getElementById('conv-container').value;
    var url = '{{.Prefix}}/htmx/conversation-list?container=' + encodeURIComponent(container);
    fetch(url).then(function(r) { return r.text(); }).then(function(html) {
        listEl.innerHTML = html;
        listEl.scrollTop = scrollTop;
        // Re-highlight current selection if any
        if (currentConvId) {
            document.querySelectorAll('[data-conv-id]').forEach(function(el) {
                el.classList.toggle('bg-muted', el.dataset.convId === currentConvId);
            });
        }
    });
}

function renderMarkdown() {
    if (typeof marked !== 'undefined') {
        document.querySelectorAll('#conv-detail .conv-markdown').forEach(function(el) {
            el.innerHTML = marked.parse(el.textContent);
        });
    }
}

function selectConversation(id) {
    currentConvId = id;
    // Update URL without reload
    var url = new URL(window.location);
    url.searchParams.set('id', id);
    history.pushState({convId: id}, '', url);
    // Highlight selected
    document.querySelectorAll('[data-conv-id]').forEach(function(el) {
        el.classList.toggle('bg-muted', el.dataset.convId === id);
    });
    // Load detail
    var detailUrl = '{{.Prefix}}/htmx/conversation-detail?id=' + encodeURIComponent(id);
    fetch(detailUrl).then(function(r) { return r.text(); }).then(function(html) {
        var el = document.getElementById('conv-detail');
        el.innerHTML = html;
        el.scrollTop = 0;
        renderMarkdown();
    });
}

function toggleSection(sectionId) {
    var el = document.getElementById(sectionId);
    var icon = document.getElementById(sectionId + '-icon');
    if (el) {
        el.classList.toggle('hidden');
        if (icon) {
            icon.style.transform = el.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(90deg)';
        }
    }
}

// Toggle a single tool call card between collapsed and expanded
function toggleToolCall(card) {
    var body = card.querySelector('.tool-call-body');
    var chevron = card.querySelector('.tool-call-chevron');
    var isExpanded = card.dataset.toolExpanded === 'true';
    if (isExpanded) {
        body.classList.add('hidden');
        chevron.style.transform = 'rotate(0deg)';
        card.dataset.toolExpanded = 'false';
    } else {
        body.classList.remove('hidden');
        chevron.style.transform = 'rotate(180deg)';
        card.dataset.toolExpanded = 'true';
    }
    updateToggleAllButton();
}

// Toggle all tool calls expanded/collapsed
function toggleAllTools() {
    var cards = document.querySelectorAll('#conv-detail .tool-call-card');
    if (cards.length === 0) return;
    // If any are collapsed, expand all; if all expanded, collapse all
    var anyCollapsed = false;
    cards.forEach(function(card) {
        if (card.dataset.toolExpanded !== 'true') anyCollapsed = true;
    });
    cards.forEach(function(card) {
        var body = card.querySelector('.tool-call-body');
        var chevron = card.querySelector('.tool-call-chevron');
        if (anyCollapsed) {
            body.classList.remove('hidden');
            chevron.style.transform = 'rotate(180deg)';
            card.dataset.toolExpanded = 'true';
        } else {
            body.classList.add('hidden');
            chevron.style.transform = 'rotate(0deg)';
            card.dataset.toolExpanded = 'false';
        }
    });
    updateToggleAllButton();
}

function updateToggleAllButton() {
    var btn = document.getElementById('toggle-all-tools-text');
    if (!btn) return;
    var cards = document.querySelectorAll('#conv-detail .tool-call-card');
    var allExpanded = true;
    cards.forEach(function(card) {
        if (card.dataset.toolExpanded !== 'true') allExpanded = false;
    });
    btn.textContent = allExpanded ? 'Collapse tools' : 'Expand tools';
}

// Toggle result expand (show all lines vs truncated)
function toggleResultExpand(btn) {
    var pre = btn.closest('div').nextElementSibling || btn.closest('div').querySelector('pre');
    if (!pre) {
        // Try sibling pre
        pre = btn.parentElement.querySelector('pre');
    }
    if (!pre) return;
    var isTruncated = pre.dataset.truncated === 'true';
    if (isTruncated) {
        pre.textContent = pre.dataset.fullContent;
        pre.style.maxHeight = '40rem';
        pre.dataset.truncated = 'false';
        btn.textContent = 'Show less';
    } else {
        // Re-truncate to 10 lines
        var lines = pre.dataset.fullContent.split('\n');
        pre.textContent = lines.slice(0, 10).join('\n') + '\n...';
        pre.style.maxHeight = '12rem';
        pre.dataset.truncated = 'true';
        btn.textContent = 'Show all';
    }
}

// Handle browser back/forward
window.addEventListener('popstate', function(e) {
    if (e.state && e.state.convId) {
        selectConversation(e.state.convId);
    } else {
        currentConvId = null;
        document.querySelectorAll('[data-conv-id]').forEach(function(el) {
            el.classList.remove('bg-muted');
        });
        document.getElementById('conv-detail').innerHTML =
            '<div class="flex items-center justify-center h-full text-muted-foreground">' +
            '<p class="text-sm">Select a conversation to view details</p></div>';
    }
});

// Auto-refresh on conversation update events
window.addEventListener('proxy:conversation-event', function() {
    if (convLive) {
        refreshConversations();
        if (currentConvId) {
            selectConversation(currentConvId);
        }
    } else {
        convPendingCount++;
        applyConvLiveStyle();
    }
});

// Initial load
applyConvLiveStyle();
refreshConversations();

// Restore from URL if conversation ID is present
(function() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');
    if (id) {
        // Wait for conversation list to load, then select
        setTimeout(function() { selectConversation(id); }, 200);
    }
})();
</script>
{{end}}
