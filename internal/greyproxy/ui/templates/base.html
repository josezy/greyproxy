            ],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Aspekta', 'system-ui', 'sans-serif'],

                    },
                    colors: {
                        background: 'rgb(var(--color-background) / <alpha-value>)',

                        card: 'rgb(var(--color-card) / <alpha-value>)',
                        'card-foreground': 'rgb(var(--color-card-foreground) / <alpha-value>)',
                        primary: 'rgb(var(--color-primary) / <alpha-value>)',
                        'primary-foreground': 'rgb(var(--color-primary-foreground) / <alpha-value>)',
                        secondary: 'rgb(var(--color-secondary) / <alpha-value>)',
                        'secondary-foreground': 'rgb(var(--color-secondary-foreground) / <alpha-value>)',
                        muted: 'rgb(var(--color-muted) / <alpha-value>)',
                        'muted-foreground': 'rgb(var(--color-muted-foreground) / <alpha-value>)',
                        accent: 'rgb(var(--color-accent) / <alpha-value>)',
                        destructive: 'rgb(var(--color-destructive) / <alpha-value>)',
                        border: 'rgb(var(--color-border) / <alpha-value>)',
                        input: 'rgb(var(--color-input) / <alpha-value>)',
                        ring: 'rgb(var(--color-ring) / <alpha-value>)',
                    },
                    borderRadius: {
                        lg: '0.625rem',
                        md: 'calc(0.625rem - 2px)',
                        sm: 'calc(0.625rem - 4px)',
                    }
                }
            }
        }
    </script>

            --color-card-foreground: 22 22 20;
            --color-primary: 217 94 42;
            --color-primary-foreground: 255 255 255;

            --color-secondary-foreground: 22 22 20;
            --color-muted: 240 240 236;

            --color-destructive: 180 51 50;
            --color-border: 221 221 215;
            --color-input: 221 221 215;
            --color-ring: 217 94 42;
            --color-green: #16a34a;
            --color-red: #dc2626;
        }
        .dark {
            --color-background: 20 20 19;
            --color-foreground: 237 237 235;
            --color-card: 28 28 26;
            --color-card-foreground: 237 237 235;
            --color-primary: 217 94 42;
            --color-primary-foreground: 255 255 255;
            --color-secondary: 35 35 32;
            --color-secondary-foreground: 237 237 235;
            --color-muted: 42 42 39;
            --color-muted-foreground: 154 154 148;
            --color-accent: 217 94 42;
            --color-destructive: 220 80 78;
            --color-border: 58 58 54;
            --color-input: 58 58 54;
            --color-ring: 217 94 42;
            --color-green: #22c55e;
            --color-red: #ef4444;

        h1,h2,h3,h4,h5,h6 { font-family: 'Source Serif Pro', Georgia, serif; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>

    <!-- Theme initialization (runs before paint to prevent flash) -->
    <script>
        (function() {
            var stored = localStorage.getItem('theme');
            if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <script>
        function toggleTheme() {
            var isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function formatNumber(n) {
            return Number(n).toLocaleString();
        }

        function showToast(message, type) {
            type = type || 'success';
            var toast = document.createElement('div');
            var bgColor = type === 'success' ? 'bg-primary' : type === 'error' ? 'bg-destructive' : 'bg-muted';
            toast.className = bgColor + ' text-white px-6 py-3 rounded-lg shadow-lg transition-opacity duration-300';
            toast.textContent = message;
            var container = document.getElementById('toast-container');
            container.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        document.body.addEventListener('htmx:afterSwap', function(event) {
            if (event.detail.xhr.getResponseHeader('X-Toast-Message')) {
                showToast(event.detail.xhr.getResponseHeader('X-Toast-Message'), 'success');
            }
        });

        document.body.addEventListener('htmx:responseError', function(event) {
            showToast('An error occurred. Please try again.', 'error');
        });
    </script>

    <script>
        (function() {
            var ws = null;
            var reconnectDelay = 1000;
            var MAX_RECONNECT_DELAY = 30000;
            var badge = document.getElementById('pending-badge');
            var badgeMobile = document.getElementById('pending-badge-mobile');

            function updateBadge(count) {
                var text = count > 99 ? '99+' : count;
                [badge, badgeMobile].forEach(function(el) {
                    if (!el) return;
                    if (count > 0) {
                        el.textContent = text;
                        el.classList.remove('hidden');
                    } else {
                        el.classList.add('hidden');
                    }
                });
            }

            function fetchPendingCount() {
                fetch('{{.Prefix}}/api/pending/count').then(function(r) { return r.json(); })
                .then(function(data) {
                    updateBadge(data.count || 0);
                }).catch(function(err) { console.warn('Failed to fetch pending count:', err); });
            }

            function connect() {
                var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(protocol + '//' + window.location.host + '{{.Prefix}}/ws');

                ws.onopen = function() {
                    reconnectDelay = 1000;
                    fetchPendingCount();
                };

                ws.onmessage = function(event) {
                    try {
                        var msg = JSON.parse(event.data);
                        if (msg.type && (msg.type.indexOf('pending_request.') === 0 || msg.type === 'waiters.changed')) {
                            fetchPendingCount();
                            window.dispatchEvent(new CustomEvent('proxy:pending-event', { detail: msg }));
                        }
                        if (msg.type === 'transaction.new') {
                            window.dispatchEvent(new CustomEvent('proxy:transaction-event', { detail: msg }));
                        }
                        if (msg.type === 'conversation.updated') {
                            window.dispatchEvent(new CustomEvent('proxy:conversation-event', { detail: msg }));
                        }
                        if (msg.type === 'maintenance.progress') {
                            window.dispatchEvent(new CustomEvent('proxy:maintenance-event', { detail: msg }));
                        }
                        if (msg.type && msg.type.indexOf('session.') === 0) {
                            window.dispatchEvent(new CustomEvent('proxy:session-event', { detail: msg }));
                        }
                        if (msg.type === 'allowall.changed') {
                            applyAllowAllState(msg.data);
                        }
                    } catch (e) {}
                };

                ws.onclose = function() {
                    setTimeout(connect, reconnectDelay);
                    reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
                };

                ws.onerror = function() { ws.close(); };
            }

            fetchPendingCount();
            connect();
        })();
    </script>

        // Silent Mode state
        var silentModeExpiresAt = null;
        var silentModeCountdownTimer = null;

        function formatDuration(seconds) {
            if (seconds <= 0) return '0s';
            var h = Math.floor(seconds / 3600);
            var m = Math.floor((seconds % 3600) / 60);
            var s = seconds % 60;
            if (h > 0) return h + 'h' + (m > 0 ? ' ' + m + 'm' : '');
            if (m > 0) return m + 'm' + (s > 0 ? ' ' + s + 's' : '');
            return s + 's';
        }

        function updateSilentModeCountdown() {
            if (!silentModeExpiresAt) return;
            var remaining = Math.max(0, Math.round((silentModeExpiresAt - Date.now()) / 1000));
            var text = formatDuration(remaining);
            var bannerExpiry = document.getElementById('allowall-banner-expiry');
            var dropdownExpiry = document.getElementById('allowall-active-expiry');
            if (bannerExpiry) bannerExpiry.textContent = '(' + text + ' remaining)';
            if (dropdownExpiry) dropdownExpiry.textContent = 'Expires in ' + text;
            if (remaining <= 0) {
                clearInterval(silentModeCountdownTimer);
                silentModeCountdownTimer = null;
                applyAllowAllState({ active: false });
            }
        }

        function applyAllowAllState(state) {
            var banner     = document.getElementById('allowall-banner');
            var icon       = document.getElementById('allowall-icon');
            var activeInfo = document.getElementById('allowall-active-info');
            var activeLabel = document.getElementById('allowall-active-label');
            var activeExpiry = document.getElementById('allowall-active-expiry');
            var stopBtn    = document.getElementById('allowall-stop-btn');
            var bannerText = document.getElementById('allowall-banner-text');
            var bannerExpiry = document.getElementById('allowall-banner-expiry');

            if (state.active) {
                var isAllow = state.mode === 'allow';
                silentModeExpiresAt = state.expires_at ? new Date(state.expires_at).getTime() : null;

                // Banner color
                if (banner) {
                    banner.classList.remove('hidden', 'bg-amber-500', 'dark:bg-amber-600', 'bg-red-600', 'dark:bg-red-700');
                    if (isAllow) {
                        banner.classList.add('bg-amber-500', 'dark:bg-amber-600');
                    } else {
                        banner.classList.add('bg-red-600', 'dark:bg-red-700');
                    }
                }

                // Shield icon color
                if (icon) {
                    icon.classList.remove('text-green-500', 'text-amber-500', 'text-red-500');
                    icon.classList.add(isAllow ? 'text-amber-500' : 'text-red-500');
                }

                // Dropdown active info
                if (activeInfo) activeInfo.classList.remove('hidden');
                if (activeLabel) {
                    activeLabel.textContent = isAllow ? 'Allow All active' : 'Deny All active';
                    activeLabel.className = 'text-xs font-medium ' + (isAllow ? 'text-amber-600 dark:text-amber-400' : 'text-red-600 dark:text-red-400');
                }

                // Banner text
                if (bannerText) {
                    bannerText.textContent = isAllow
                        ? 'Silent Mode — all connections allowed without asking'
                        : 'Silent Mode — all connections denied without asking';
                }

                // Expiry
                if (silentModeExpiresAt) {
                    updateSilentModeCountdown();
                    if (!silentModeCountdownTimer) {
                        silentModeCountdownTimer = setInterval(updateSilentModeCountdown, 1000);
                    }
                } else {
                    if (bannerExpiry) bannerExpiry.textContent = '(until restart)';
                    if (activeExpiry) activeExpiry.textContent = 'Active until restart';
                }

                if (stopBtn) stopBtn.classList.remove('hidden');

            } else {
                silentModeExpiresAt = null;
                if (silentModeCountdownTimer) {
                    clearInterval(silentModeCountdownTimer);
                    silentModeCountdownTimer = null;
                }
                if (banner) banner.classList.add('hidden');
                if (icon) {
                    icon.classList.remove('text-amber-500', 'text-red-500');
                    icon.classList.add('text-green-500');
                }
                if (activeInfo) activeInfo.classList.add('hidden');
                if (stopBtn) stopBtn.classList.add('hidden');
            }
        }

        function toggleAllowAllMenu() {
            var dropdown = document.getElementById('allowall-dropdown');
            if (dropdown) dropdown.classList.toggle('hidden');
        }

        function enableSilentMode(mode, duration) {
            document.getElementById('allowall-dropdown').classList.add('hidden');
            fetch('{{.Prefix}}/api/allowall', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ duration: duration, mode: mode })
            }).then(function(r) { return r.json(); }).then(function(data) {
                applyAllowAllState(data);
            }).catch(function() { showToast('Failed to enable Silent Mode', 'error'); });
        }

        function disableAllowAll() {
            document.getElementById('allowall-dropdown').classList.add('hidden');
            fetch('{{.Prefix}}/api/allowall', { method: 'DELETE' })
                .then(function(r) { return r.json(); }).then(function(data) {
                    applyAllowAllState(data);
                }).catch(function() { showToast('Failed to stop Silent Mode', 'error'); });
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            var container = document.getElementById('allowall-menu-container');
            if (container && !container.contains(e.target)) {
                var dropdown = document.getElementById('allowall-dropdown');
                if (dropdown) dropdown.classList.add('hidden');
            }
        });

        // Fetch initial silent mode state on page load
        fetch('{{.Prefix}}/api/allowall').then(function(r) { return r.json(); }).then(function(data) {
            applyAllowAllState(data);
        }).catch(function() {});
    </script>

    {{block "scripts" .}}{{end}}
</body>

</html>
