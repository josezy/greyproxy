<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="icon" type="image/svg+xml" href="{{.Prefix}}/static/icons/favicon.svg">

    <!-- Preload fonts to avoid layout shift -->
    <link rel="preload" href="{{.Prefix}}/static/fonts/Aspekta-600.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Custom CSS -->
    <link href="{{.Prefix}}/static/css/style.css?v={{.CacheBuster}}" rel="stylesheet">

    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            safelist: [
                'text-green-600', 'text-blue-600', 'text-yellow-600', 'text-red-600',
            ],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Aspekta', 'system-ui', 'sans-serif'],
                        serif: ['Source Serif Pro', 'Georgia', 'serif'],
                    },
                    colors: {
                        background: 'rgb(var(--color-background) / <alpha-value>)',
                        foreground: 'rgb(var(--color-foreground) / <alpha-value>)',
                        card: 'rgb(var(--color-card) / <alpha-value>)',
                        'card-foreground': 'rgb(var(--color-card-foreground) / <alpha-value>)',
                        primary: 'rgb(var(--color-primary) / <alpha-value>)',
                        'primary-foreground': 'rgb(var(--color-primary-foreground) / <alpha-value>)',
                        secondary: 'rgb(var(--color-secondary) / <alpha-value>)',
                        'secondary-foreground': 'rgb(var(--color-secondary-foreground) / <alpha-value>)',
                        muted: 'rgb(var(--color-muted) / <alpha-value>)',
                        'muted-foreground': 'rgb(var(--color-muted-foreground) / <alpha-value>)',
                        accent: 'rgb(var(--color-accent) / <alpha-value>)',
                        destructive: 'rgb(var(--color-destructive) / <alpha-value>)',
                        border: 'rgb(var(--color-border) / <alpha-value>)',
                        input: 'rgb(var(--color-input) / <alpha-value>)',
                        ring: 'rgb(var(--color-ring) / <alpha-value>)',
                    },
                    borderRadius: {
                        lg: '0.625rem',
                        md: 'calc(0.625rem - 2px)',
                        sm: 'calc(0.625rem - 4px)',
                    }
                }
            }
        }
    </script>

    {{block "head" .}}{{end}}

    <style>
        :root {
            --color-background: 255 255 255;
            --color-foreground: 22 22 20;
            --color-card: 249 249 247;
            --color-card-foreground: 22 22 20;
            --color-primary: 217 94 42;
            --color-primary-foreground: 255 255 255;
            --color-secondary: 249 249 247;
            --color-secondary-foreground: 22 22 20;
            --color-muted: 240 240 236;
            --color-muted-foreground: 127 127 121;
            --color-accent: 217 94 42;
            --color-destructive: 180 51 50;
            --color-border: 221 221 215;
            --color-input: 221 221 215;
            --color-ring: 217 94 42;
            --color-green: #16a34a;
            --color-red: #dc2626;
        }
        .dark {
            --color-background: 20 20 19;
            --color-foreground: 237 237 235;
            --color-card: 28 28 26;
            --color-card-foreground: 237 237 235;
            --color-primary: 217 94 42;
            --color-primary-foreground: 255 255 255;
            --color-secondary: 35 35 32;
            --color-secondary-foreground: 237 237 235;
            --color-muted: 42 42 39;
            --color-muted-foreground: 154 154 148;
            --color-accent: 217 94 42;
            --color-destructive: 220 80 78;
            --color-border: 58 58 54;
            --color-input: 58 58 54;
            --color-ring: 217 94 42;
            --color-green: #22c55e;
            --color-red: #ef4444;
        }
        @font-face { font-family: 'Aspekta'; src: url('{{.Prefix}}/static/fonts/Aspekta-500.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
        @font-face { font-family: 'Aspekta'; src: url('{{.Prefix}}/static/fonts/Aspekta-600.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
        @font-face { font-family: 'Aspekta'; src: url('{{.Prefix}}/static/fonts/Aspekta-700.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
        @font-face { font-family: 'Source Serif Pro'; src: url('{{.Prefix}}/static/fonts/source-serif-pro-600.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
        @font-face { font-family: 'Source Serif Pro'; src: url('{{.Prefix}}/static/fonts/source-serif-pro-700.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
        body { font-family: 'Aspekta', system-ui, -apple-system, sans-serif; }
        h1,h2,h3,h4,h5,h6 { font-family: 'Source Serif Pro', Georgia, serif; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>

    <!-- Theme initialization (runs before paint to prevent flash) -->
    <script>
        (function() {
            var stored = localStorage.getItem('theme');
            if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

    <!-- Toast notifications container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

    <script>
        function toggleTheme() {
            var isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function formatNumber(n) {
            return Number(n).toLocaleString();
        }

        function showToast(message, type) {
            type = type || 'success';
            var toast = document.createElement('div');
            var bgColor = type === 'success' ? 'bg-primary' : type === 'error' ? 'bg-destructive' : 'bg-muted';
            toast.className = bgColor + ' text-white px-6 py-3 rounded-lg shadow-lg transition-opacity duration-300';
            toast.textContent = message;
            var container = document.getElementById('toast-container');
            container.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        document.body.addEventListener('htmx:afterSwap', function(event) {
            if (event.detail.xhr.getResponseHeader('X-Toast-Message')) {
                showToast(event.detail.xhr.getResponseHeader('X-Toast-Message'), 'success');
            }
        });

        document.body.addEventListener('htmx:responseError', function(event) {
            showToast('An error occurred. Please try again.', 'error');
        });
    </script>

    <script>
        (function() {
            var ws = null;
            var reconnectDelay = 1000;
            var MAX_RECONNECT_DELAY = 30000;
            var badge = document.getElementById('pending-badge');
            var badgeMobile = document.getElementById('pending-badge-mobile');

            function updateBadge(count) {
                var text = count > 99 ? '99+' : count;
                [badge, badgeMobile].forEach(function(el) {
                    if (!el) return;
                    if (count > 0) {
                        el.textContent = text;
                        el.classList.remove('hidden');
                    } else {
                        el.classList.add('hidden');
                    }
                });
            }

            function fetchPendingCount() {
                fetch('{{.Prefix}}/api/pending/count').then(function(r) { return r.json(); })
                .then(function(data) {
                    updateBadge(data.count || 0);
                }).catch(function(err) { console.warn('Failed to fetch pending count:', err); });
            }

            function connect() {
                var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(protocol + '//' + window.location.host + '{{.Prefix}}/ws');

                ws.onopen = function() {
                    reconnectDelay = 1000;
                    fetchPendingCount();
                };

                ws.onmessage = function(event) {
                    try {
                        var msg = JSON.parse(event.data);
                        if (msg.type && (msg.type.indexOf('pending_request.') === 0 || msg.type === 'waiters.changed')) {
                            fetchPendingCount();
                            window.dispatchEvent(new CustomEvent('proxy:pending-event', { detail: msg }));
                        }
                        if (msg.type === 'transaction.new') {
                            window.dispatchEvent(new CustomEvent('proxy:transaction-event', { detail: msg }));
                        }
                        if (msg.type === 'conversation.updated') {
                            window.dispatchEvent(new CustomEvent('proxy:conversation-event', { detail: msg }));
                        }
                        if (msg.type === 'maintenance.progress') {
                            window.dispatchEvent(new CustomEvent('proxy:maintenance-event', { detail: msg }));
                        }
                        if (msg.type && msg.type.indexOf('session.') === 0) {
                            window.dispatchEvent(new CustomEvent('proxy:session-event', { detail: msg }));
                        }
                    } catch (e) {}
                };

                ws.onclose = function() {
                    setTimeout(connect, reconnectDelay);
                    reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
                };

                ws.onerror = function() { ws.close(); };
            }

            fetchPendingCount();
            connect();
        })();
    </script>

    {{block "scripts" .}}{{end}}
</body>
