{{define "content"}}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-foreground">Dashboard</h1>
        <button hx-get="{{.Prefix}}/htmx/dashboard-stats" hx-target="#dashboard-content" hx-swap="innerHTML"
            hx-include="#period-selector, #auto-refresh"
            class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-primary-foreground bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-ring">
            <svg class="htmx-indicator -ml-1 mr-2 h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Refresh
        </button>
    </div>

    <div class="flex items-center space-x-4">
        <select id="period-selector"
                class="px-4 py-2 border border-border rounded-lg bg-card text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-ring"
                hx-get="{{.Prefix}}/htmx/dashboard-stats"
                hx-target="#dashboard-content"
                hx-swap="innerHTML"
                hx-include="#auto-refresh">
            <option value="today">Today</option>
            <option value="7d">Last 7 Days</option>
            <option value="30d">Last 30 Days</option>
        </select>

        <label class="flex items-center space-x-2 cursor-pointer">
            <input type="checkbox" id="auto-refresh" name="auto_refresh"
                   class="w-4 h-4 text-primary border-border rounded focus:ring-ring"
                   onchange="toggleAutoRefresh(this.checked)">
            <span class="text-sm text-muted-foreground">Auto-refresh</span>
        </label>
    </div>

    <div id="dashboard-content"
         hx-get="{{.Prefix}}/htmx/dashboard-stats"
         hx-trigger="load"
         hx-include="#period-selector, #auto-refresh"
         hx-swap="innerHTML">
        <div class="flex items-center justify-center py-20">
            <div class="inline-block w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>
</div>

<script>
    var autoRefreshInterval = null;
    function toggleAutoRefresh(enabled) {
        if (enabled) {
            autoRefreshInterval = setInterval(function() {
                htmx.trigger('#dashboard-content', 'load');
            }, 30000);
        } else {
            if (autoRefreshInterval) { clearInterval(autoRefreshInterval); autoRefreshInterval = null; }
        }
    }
</script>
{{end}}
