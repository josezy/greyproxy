# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/greyproxy
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      # - linux_mips_softfloat
      # - linux_mips_hardfloat
      # - linux_mipsle_softfloat
      # - linux_mipsle_hardfloat
      # - linux_mips64
      # - linux_mips64le
      # - linux_s390x
      # - linux_riscv64
      # - linux_loong64
      # - freebsd_386
      # - freebsd_amd64
      # - windows_386
      # - windows_amd64
      # - windows_amd64_v3
      # - windows_arm64
      # - android_arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X main.gitCommit={{.Commit}}

upx:
  - enabled: true
    goos: [linux]
    goarch: [arm, arm64, amd64]
    compress: best
    lzma: true
    brute: true

  # - enabled: true
  #   goos: [windows]
  #   goarch: [amd64]
  #   compress: best
  #   lzma: true
  #   brute: true

archives:
  - formats: ['tar.gz']
    # format_overrides:
    # - goos: windows
    #   formats: ['zip']

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

homebrew_casks:
  - repository:
      owner: GreyhavenHQ
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    skip_upload: auto
    homepage: "https://github.com/GreyhavenHQ/greyproxy"
    description: "SOCKS5 proxy with DNS resolution and web dashboard for network sandboxing"
    license: "Apache-2.0"
    binaries:
      - greyproxy
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/greyproxy"]
            system_command "#{staged_path}/greyproxy", args: ["install", "-f"]
          end
        uninstall: |
          if OS.mac?
            system_command "#{staged_path}/greyproxy", args: ["uninstall", "-f"]
          end
    dependencies:
      - formula: terminal-notifier
    caveats: |
      greyproxy has been installed and started as a launchd user agent.
      Dashboard: http://localhost:43080

      For desktop notifications on macOS, install terminal-notifier:
        brew install terminal-notifier

release:
  prerelease: auto
  mode: keep-existing
