# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/greyproxy
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      # - linux_mips_softfloat
      # - linux_mips_hardfloat
      # - linux_mipsle_softfloat
      # - linux_mipsle_hardfloat
      # - linux_mips64
      # - linux_mips64le
      # - linux_s390x
      # - linux_riscv64
      # - linux_loong64
      # - freebsd_386
      # - freebsd_amd64
      # - windows_386
      # - windows_amd64
      # - windows_amd64_v3
      # - windows_arm64
      # - android_arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X main.gitCommit={{.Commit}}

upx:
  - enabled: true
    goos: [linux]
    goarch: [arm, arm64, amd64]
    compress: best
    lzma: true
    brute: true

  # - enabled: true
  #   goos: [windows]
  #   goarch: [amd64]
  #   compress: best
  #   lzma: true
  #   brute: true

archives:
  - formats: ['tar.gz']
    # format_overrides:
    # - goos: windows
    #   formats: ['zip']

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  prerelease: auto
  mode: keep-existing
